services:
  roster:
    build: .
    restart: always
    # Host port -> container's fixed 3000. Set ROSTER_PORT in .env.
    ports:
      - '${ROSTER_PORT:-8091}:3000'
    environment:
      # Public URL (scheme + host, no trailing slash). REQUIRED behind a reverse proxy, or
      # SvelteKit rejects the poll/generate form POSTs as cross-origin (403).
      - ORIGIN=${ORIGIN:?set ORIGIN in .env (e.g. https://roster.example.org)}
      - ROSTER_DB=/data/roster.db
      # Event name shown in the header (display only).
      - EVENT_NAME=${EVENT_NAME:-parkrun}
      # allow the EMS "Save Page As" upload (adapter-node default body limit is ~512kb)
      - BODY_SIZE_LIMIT=5M
    volumes:
      # Host directory for the SQLite DB (persists across rebuilds). Back this up.
      - '${ROSTER_DB_DIR:-./data}:/data'
